#####
# Ansible-lint configuration for cantina.core collection
# Docs: https://github.com/ansible/ansible-lint/blob/main/.ansible-lint
#####

exclude_paths:
  - .cache/
  - .git/
  - molecule/

loop_var_prefix: "{role}_"
use_default_rules: true

skip_list:
  - git-latest
  - line-length
  - comments
  - no-loop-var-prefix
  - command-instead-of-shell
  - no-changed-when
  - experimental
  - command-instead-of-module
  - role-name
  - no-handler
  - meta-no-info
  - meta-incorrect
  - no-jinja-when
  - no-tabs
  - risky-shell-pipe

offline: true

kinds:
  - tasks: "**/tasks/*.yml"
  - handlers: "**/handlers/*.yml"
  - vars: "**/vars/*.yml"
  - defaults: "**/defaults/*.yml"
  - meta: "**/meta/main.yml"
  - yaml: "**/*.yml"
